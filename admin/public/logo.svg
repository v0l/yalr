<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#gradient)" opacity="0.1"/>
  
  <!-- Router nodes -->
  <circle cx="100" cy="60" r="15" fill="url(#gradient)"/>
  <circle cx="60" cy="120" r="15" fill="url(#gradient)"/>
  <circle cx="140" cy="120" r="15" fill="url(#gradient)"/>
  
  <!-- Connecting lines -->
  <line x1="100" y1="75" x2="70" y2="110" stroke="url(#gradient)" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="75" x2="130" y2="110" stroke="url(#gradient)" stroke-width="4" stroke-linecap="round"/>
  <line x1="70" y1="110" x2="130" y2="110" stroke="url(#gradient)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Center hub -->
  <circle cx="100" cy="100" r="20" fill="white" opacity="0.9"/>
  <circle cx="100" cy="100" r="12" fill="url(#gradient)"/>
  
  <!-- YALR text -->
  <text x="100" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="url(#gradient)" text-anchor="middle">YALR</text>
</svg>
